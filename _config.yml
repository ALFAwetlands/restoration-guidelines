# SITE SETTINGS
title: Peatland restoration guidelines
author: ALFAwetlands
baseurl: "/restoration-guidelines"
github_edit: false

# THEME SETTINGS
remote_theme: peterdesmet/petridish@3.1
github_edit: gh-pages
colors:
  links: "#0F71B8"  # Blue
  banner: "#A4C3B2" # Muted teal
  footer: "#6B9080" # Jungle teal
font_serif: false
rounded_corners: true
logo: /assets/images/created_logo.png

# BUILD SETTINGS
repository: ALFAwetlands/restoration-guidelines
markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-sitemap
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - LICENSE

# FRONTMATTER DEFAULTS
defaults:
  - scope:
      path: pages/peatlands
    values:
      toc: true
      permalink: /peatlands/:basename/